name: Keep server warm

# Pings the Render server's /health endpoint so the free-tier instance does not
# spin down during active hours (it sleeps after ~15 min idle, and cold starts
# take up to ~1 min). See CLAUDE.md "Live" deployment notes.
#
# GitHub cron is UTC-only and has no DST support, so the window below covers
# ~6am-10pm Pacific year-round (union of PST/UTC-8 and PDT/UTC-7):
#   13:00-06:00 UTC  ->  ~18h/day  ~=  540 instance-hours/month,
# comfortably under Render's ~750-hour/month free allowance. Outside this
# window the server is allowed to sleep.
on:
  schedule:
    - cron: '*/10 13-23 * * *' # 13:00-23:59 UTC
    - cron: '*/10 0-6 * * *' #  00:00-06:59 UTC
  workflow_dispatch: {} # allow manual "wake it now" runs

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health
        # Base URL of the Render service (no trailing slash), e.g.
        # https://retro-board-server.onrender.com. Set it under
        # Settings -> Secrets and variables -> Actions -> Variables.
        env:
          BASE_URL: ${{ vars.RENDER_HEALTH_URL }}
        run: |
          if [ -z "$BASE_URL" ]; then
            echo "::error::Set the RENDER_HEALTH_URL repository variable (Settings -> Secrets and variables -> Actions -> Variables)."
            exit 1
          fi
          # --max-time and retries let a single run ride out a cold start.
          curl --fail --silent --show-error \
            --max-time 90 --retry 3 --retry-delay 20 --retry-all-errors \
            "$BASE_URL/health"
